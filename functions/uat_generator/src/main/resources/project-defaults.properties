# Default Zoho Projects portal and project the UAT generator pushes to.
#
# portal: either the numeric portal id_string OR the portal's URL slug
#         (the server resolves slugs to numeric IDs on first call).
# project: the numeric project id_string (from the # part of the Projects URL).
#
# These act as fallbacks when the request body / env vars don't specify a
# portal_id / project_id. Order of precedence in PushServlet:
#   1. portal_id / project_id in the POST body
#   2. ZOHO_PROJECTS_PORTAL_ID / ZOHO_PROJECTS_PROJECT_ID env vars
#   3. these properties

portal=test3888
project=430702000000130021
